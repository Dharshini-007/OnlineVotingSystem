{% extends "layout.html" %}

{% block content %}
<div class="auth-container">
    <div class="auth-card glass-panel">
        <h2>Create an Account</h2>
        <p>Register as a voter in the system.</p>
        
        <form action="{{ url_for('register') }}" method="POST" class="auth-form">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" required placeholder="John Doe">
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="name@domain.com">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="••••••••">
            </div>
            
            <button type="submit" class="btn-primary full-width">Register</button>
        </form>
        
        <p class="auth-footer">Already have an account? <a href="{{ url_for('login') }}">Sign In</a></p>
    </div>
</div>
{% endblock %}
