{% extends "layout.html" %}

{% block content %}
<div class="auth-container">
    <div class="auth-card glass-panel">
        <h2>Welcome Back</h2>
        <p>Log in to access the voting portal.</p>
        
        <form action="{{ url_for('login') }}" method="POST" class="auth-form">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="name@domain.com">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="••••••••">
            </div>
            
            <button type="submit" class="btn-primary full-width">Sign In</button>
        </form>
        
        <p class="auth-footer">Don't have an account? <a href="{{ url_for('register') }}">Register here</a></p>
    </div>
</div>
{% endblock %}
